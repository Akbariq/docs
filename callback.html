<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snipbite — Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 16px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.5; }
        .url-box {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 16px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            text-align: left;
            margin-bottom: 16px;
            color: #333;
        }
        .copy-btn {
            background: #333;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .copy-btn:hover { background: #555; }
        .success { color: #2ecc71; font-weight: bold; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Authorization Successful</h1>
        <p id="message">Copy the URL from your browser's address bar and paste it into your terminal.</p>
        <div class="url-box" id="url-display"></div>
        <button class="copy-btn" onclick="copyUrl()">Copy URL</button>
        <p id="status"></p>
    </div>
    <script>
        var fullUrl = window.location.href;
        document.getElementById('url-display').textContent = fullUrl;

        var params = new URLSearchParams(window.location.search);
        if (params.has('error')) {
            document.getElementById('title').textContent = 'Authorization Failed';
            document.getElementById('title').classList.add('error');
            document.getElementById('message').textContent = 'Error: ' + (params.get('error_description') || params.get('error'));
        }

        function copyUrl() {
            navigator.clipboard.writeText(fullUrl).then(function() {
                document.getElementById('status').innerHTML = '<span class="success">Copied! Paste this into your terminal.</span>';
            });
        }
    </script>
</body>
</html>
